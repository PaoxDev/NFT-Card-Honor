<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NFT Card</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main>
            <section>
                <div class="card-header">
                    <img class="card-image" src="ronin.png" alt="Ronin Samurai">
  
                    <h1 class="card-title">Honor #1204</h1>
                    <p class="card-para">
                        Honor is not discourse. It is consistency and repetition.
                        What destroys a man is not making mistakes. It is losing confidence in himself.
                    </p>
                
                <div class="info-row">
                    <div class="info-left">
                      <svg xmlns="http://www.w3.org/2000/svg" width="11" height="18"><path d="M11 10.216 5.5 18 0 10.216l5.5 3.263 5.5-3.262ZM5.5 0l5.496 9.169L5.5 12.43 0 9.17 5.5 0Z" fill="#00FFF8"/>
                      </svg>
                      <span class="price">0.041 ETH</span>
                    </div>
                    <div class="info-right">
                      <svg class="info-right" xmlns="http://www.w3.org/2000/svg" width="17" height="17"><path d="M8.305 2.007a6.667 6.667 0 1 0 0 13.334 6.667 6.667 0 0 0 0-13.334Zm2.667 7.334H8.305a.667.667 0 0 1-.667-.667V6.007a.667.667 0 0 1 1.334 0v2h2a.667.667 0 0 1 0 1.334Z" fill="#8BACD9"/>
                      </svg>
                      <span class="time">3 days left</span>
                    </div>  
                </div> 
                <hr class="divider">

                <div class="creator">
                  <img class="avatar" src="paox2.png" alt="paox2 photo">
                  <p class="creator-text">
                     Creation of <a href="https://github.com/PaoxDev" target="_blank"><strong>PaoxDev</strong></a>
                  </p>
                  </div>  
                </div> 
            </section>    
        </main>
    </body>
</html>
